<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Map — Shared View</title>
    <meta name="description" content="Viewing a shared Multi-Map workspace map.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="multi-map-ui.css">

    <!-- CRITICAL LOAD ORDER -->
    <script src="multi-map-library.js"></script>
    <script src="auth.js" type="module"></script>
    <script src="multi-map-rules.js"></script>
    <script src="multi-map-core.js"></script>
    <script src="phase-engines.js"></script>
    <script src="multi-map-sandbox.js"></script>
    <script src="multi_map_ai_engine.js"></script>
    <script src="multi-map-tutorials.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="overflow-hidden bg-slate-950 select-none">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 display flex flex-col items-center justify-center gap-16 bg-slate-950 z-[200]">
        <div class="w-9 h-9 border-3 border-slate-800 border-t-sky-500 rounded-full animate-spin"></div>
        <div class="text-xs text-slate-500 uppercase tracking-widest font-bold">Loading shared map...</div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="fixed inset-0 hidden flex-col items-center justify-center gap-6 bg-slate-950 z-[200]">
        <div id="error-icon" class="text-5xl">⚠️</div>
        <div id="error-msg" class="text-slate-400 text-sm text-center max-w-sm leading-relaxed px-4"></div>
        <a href="/" class="px-6 py-2.5 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-white font-bold rounded-lg text-xs transition-all">Go to Multi-Map →</a>
    </div>

    <!-- Read-Only Banner / Navbar -->
    <nav id="top-banner" class="hidden h-14 border-b border-slate-800 bg-slate-900/50 justify-between items-center px-4 z-50 relative backdrop-blur w-full gap-4">
        <div class="flex items-center gap-3 shrink-0 min-w-0">
            <span class="text-xl">🗺️</span>
            <div class="min-w-0">
                <div id="map-title" class="text-sm font-bold text-slate-200 truncate max-w-[200px] md:max-w-sm">Untitled Map</div>
                <div id="map-meta" class="text-[9px] text-slate-500 uppercase tracking-widest font-medium truncate mt-0.5">Public shared map</div>
            </div>
        </div>

        <!-- Central Search Bar (Navigation tool) -->
        <div class="flex-1 max-w-md relative z-50">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" id="map-search-input" placeholder="Search map nodes..."
                    class="w-full bg-slate-950/60 border border-slate-700 text-slate-200 pl-8 pr-3 py-1.5 rounded-full text-xs outline-none focus:border-sky-500 focus:bg-slate-900 transition-colors placeholder:text-slate-500 shadow-inner">
            </div>
            <div id="map-search-results"
                class="hidden absolute top-full mt-2 left-0 right-0 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl max-h-64 overflow-y-auto custom-scrollbar flex-col gap-1 p-2 backdrop-blur-md">
            </div>
        </div>

        <!-- Fork & Return Actions -->
        <div class="flex items-center gap-2 shrink-0">
            <a id="back-link" href="/" class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-slate-400 hover:text-white px-3 py-2 border border-slate-800 hover:border-slate-700 bg-slate-900/40 rounded-lg transition-all">← Back</a>
            <button id="fork-btn" class="text-[10px] md:text-xs font-bold uppercase tracking-wider bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg shadow-lg hover:shadow-blue-500/20 transition-all">Fork Map</button>
        </div>
    </nav>

    <!-- Stage / Canvas viewport -->
    <div id="stage" class="hidden">
        <div id="viewport" class="relative flex-1 bg-slate-950 min-w-0">
            <!-- Map Layer -->
            <div id="view-map" class="absolute inset-0 overflow-hidden">
                <svg id="edge-svg" class="absolute inset-0 pointer-events-none"></svg>
                <div id="world-layer" class="z-10 absolute inset-0"></div>
            </div>
        </div>
    </div>

    <!-- AI Widget Container (which dynamically generates #ai-tooltip-bar and #btn-smart-action) -->
    <div id="ai-chat-container"></div>

    <!-- Hidden placeholders to satisfy SandboxController constructor DOM constraints -->
    <div id="sidebar" class="hidden"></div>
    <div id="linking-overlay" class="hidden"></div>
    <div id="panel-properties" class="hidden"></div>
    <div id="view-content" class="hidden"></div>

    <script type="module">
        import { doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const $ = id => document.getElementById(id);
        let mapData = null;
        let db = null;
        let auth = null;

        // Wait for auth.js module execution to initialize Firebase globals
        function runWhenReady() {
            if (window.FirebaseDb && window.FirebaseAuth) {
                db = window.FirebaseDb;
                auth = window.FirebaseAuth;
                
                // Track auth state to configure Back button href
                onAuthStateChanged(auth, user => {
                    $('back-link').href = user ? '/sandbox.html' : '/';
                });
                
                initSharedView();
            } else {
                setTimeout(runWhenReady, 50);
            }
        }
        runWhenReady();

        function showError(msg, icon = '⚠️') {
            $('loading-screen').style.display = 'none';
            $('error-icon').textContent = icon;
            $('error-msg').textContent = msg;
            $('error-screen').classList.remove('hidden');
        }

        async function initSharedView() {
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) return showError('No share token provided in the URL.', '🔗');

            try {
                const dbRef = doc(db, 'shared_maps', token);
                let firstLoad = true;
                let Kernel = null;
                let Controller = null;

                onSnapshot(dbRef, (snap) => {
                    if (!snap.exists()) {
                        showError('This shared map does not exist or has been removed.', '🗑️');
                        return;
                    }

                    mapData = snap.data();
                    if (mapData.meta?.share_expires && new Date(mapData.meta.share_expires) < new Date()) {
                        showError('This shared link has expired.', '⏳');
                        return;
                    }

                    if (firstLoad) {
                        firstLoad = false;

                        // Setup DOM titles and headers
                        document.title = (mapData.meta?.title || 'Shared Map') + ' — Multi-Map';
                        $('map-title').textContent = mapData.meta?.title || 'Untitled Map';
                        const owner = mapData.owner_display ? 'Shared by ' + mapData.owner_display : 'Public shared map';
                        const exp = mapData.meta?.share_expires ? ' · expires ' + new Date(mapData.meta.share_expires).toLocaleDateString() : '';
                        $('map-meta').textContent = owner + exp;

                        // Load read-only Multi-Map structures
                        Kernel = new MultiMapKernel(true);
                        Kernel.state = Kernel.ensureSchema(mapData);
                        Kernel.activeProjectId = mapData.meta?.project_id || 'shared_project';

                        const Registry = new PhaseRegistrySystem();
                        Registry.init(Kernel);

                        // Setup Sandbox Controller
                        Controller = new SandboxController(Kernel, Registry);
                        
                        // Bind Globals for sandbox handlers
                        window.Kernel = Kernel;
                        window.SC = Controller;

                        // INITIATE AI ENGINE
                        window.AI = new MultiMapAI(Kernel, Controller);

                        // Hide loading screen and display stage
                        $('loading-screen').style.display = 'none';
                        $('top-banner').style.display = 'flex';
                        $('top-banner').classList.remove('hidden');
                        $('stage').classList.remove('hidden');

                        // Render Map Canvas
                        Controller.render();

                        // Select root node initially if exists
                        if (Kernel.state.nodes.length > 0) {
                            Kernel.selectNode(Kernel.state.nodes[0].id);
                            Controller.render();
                        }

                        // Bind fork action
                        $('fork-btn').onclick = handleFork;
                    } else {
                        console.log("Real-time map update received.");
                        
                        // Keep current selection and viewport coordinates
                        const prevSelectedId = Kernel.state.session?.selectedId;
                        const prevViewport = Kernel.state.session?.viewport;

                        Kernel.state = Kernel.ensureSchema(mapData);

                        if (prevSelectedId && Kernel.state.nodes.some(n => n.id === prevSelectedId)) {
                            Kernel.state.session.selectedId = prevSelectedId;
                        }
                        if (prevViewport) {
                            Kernel.state.session.viewport = prevViewport;
                        }

                        Controller.render();
                    }
                }, (error) => {
                    console.error("Real-time snapshot listener failed:", error);
                    if (firstLoad) {
                        showError('Could not load the shared map:\n' + error.message);
                    }
                });

            } catch (e) {
                console.error(e);
                showError('Could not load the shared map:\n' + e.message);
            }
        }

        async function handleFork() {
            const forkBtn = $('fork-btn');
            if (!mapData) return;

            forkBtn.disabled = true;
            forkBtn.textContent = 'Forking...';

            const user = auth.currentUser;
            const isAuthenticated = user && !user.isAnonymous;

            const newProjectId = 'proj_' + Math.random().toString(36).substr(2, 9);
            const newPageId = 'page_' + Math.random().toString(36).substr(2, 9);

            // Clone map data
            const forkData = JSON.parse(JSON.stringify(mapData));
            forkData.map_id = newPageId;
            forkData.meta.project_id = newProjectId;
            forkData.meta.shared = false;
            forkData.meta.share_token = '';
            forkData.meta.share_expires = null;
            forkData.meta.title = (forkData.meta.title || 'Shared Map') + ' (Fork)';
            delete forkData.owner_uid;
            delete forkData.owner_display;

            let projectTitle = forkData.meta.title;
            let pageIds = [newPageId];
            let masterPageId = newPageId;
            let masterPageData = null;

            const wasMaster = forkData.meta.isMaster === true;

            // If the shared map is not a master directory, we wrap it in a fresh project structure
            if (!wasMaster) {
                masterPageId = 'page_' + Math.random().toString(36).substr(2, 9);
                pageIds = [masterPageId, newPageId];
                
                masterPageData = {
                    map_id: masterPageId,
                    meta: {
                        title: "Project Directory",
                        type: "file",
                        created: new Date().toISOString(),
                        shared: false,
                        project_id: newProjectId,
                        isMaster: true
                    },
                    nodes: [
                        { id: 'root_' + Math.random().toString(36).substr(2, 9), type: "file-root", title: "Project Directory", data: { x: 0, y: 0, isCore: true } },
                        { id: 'portal_' + Math.random().toString(36).substr(2, 9), type: "portal", title: forkData.meta.title, content: newPageId, data: { x: 0, y: 150, isSyncPortal: true } }
                    ],
                    connections: [],
                    session: {
                        viewport: { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 },
                        selectedId: null,
                        remoteTemplates: [],
                        layoutMode: 'organic'
                    }
                };

                // Structural connection from root to forked portal
                masterPageData.connections.push({
                    id: 'conn_' + Math.random().toString(36).substr(2, 9),
                    from: masterPageData.nodes[0].id,
                    to: masterPageData.nodes[1].id,
                    type: 'structural'
                });

                projectTitle = "Imported Project";
            } else {
                forkData.meta.isMaster = true;
            }

            const newProj = {
                project_id: newProjectId,
                meta: {
                    title: projectTitle,
                    description: `Forked from shared map`,
                    icon: "🍴",
                    color: "#3b82f6"
                },
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
                page_ids: pageIds,
                folders: [],
                page_assignments: {}
            };

            try {
                if (isAuthenticated) {
                    // Save to Firestore collections
                    const projRef = doc(db, "users", user.uid, "projects", newProjectId);
                    await setDoc(projRef, newProj);

                    if (masterPageData) {
                        const masterPageRef = doc(db, "users", user.uid, "projects", newProjectId, "pages", masterPageId);
                        await setDoc(masterPageRef, masterPageData);
                    }

                    const pageRef = doc(db, "users", user.uid, "projects", newProjectId, "pages", newPageId);
                    await setDoc(pageRef, forkData);

                    // Configure active session state
                    const sessionRef = doc(db, "users", user.uid, "sessions", "active");
                    await setDoc(sessionRef, {
                        activeProjectId: newProjectId,
                        activeMapId: masterPageId,
                        portalHistory: []
                    });
                } else {
                    // Save to localStorage (Guest mode)
                    const projects = JSON.parse(localStorage.getItem("mm_projects") || "[]");
                    projects.push(newProj);
                    localStorage.setItem("mm_projects", JSON.stringify(projects));

                    const lib = JSON.parse(localStorage.getItem("mm_constellation_lib") || "[]");
                    if (masterPageData) lib.push(masterPageData);
                    lib.push(forkData);
                    localStorage.setItem("mm_constellation_lib", JSON.stringify(lib));

                    // Set current active state
                    localStorage.setItem("mm_core_state", JSON.stringify(masterPageData || forkData));
                }

                forkBtn.textContent = '✅ Forked!';
                forkBtn.style.backgroundColor = '#16a34a';

                setTimeout(() => {
                    window.location.href = '/sandbox.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                alert('Fork failed: ' + err.message);
                forkBtn.disabled = false;
                forkBtn.textContent = 'Fork Map';
                forkBtn.style.backgroundColor = '#2563eb';
            }
        }
    </script>
</body>
</html>
