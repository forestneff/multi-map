<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor Phase Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbars */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        body {
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: #090d16;
            color: #cbd5e1;
        }

        /* Light Mode Styleset */
        body.light-mode {
            background: #fafaf9;
            color: #1c1917;
        }
        body.light-mode .text-white { color: #1c1917 !important; }
        body.light-mode .text-slate-100, 
        body.light-mode .text-slate-200, 
        body.light-mode .text-slate-350, 
        body.light-mode .text-slate-300, 
        body.light-mode .text-slate-400 { color: #44403c !important; }
        body.light-mode .text-slate-500, 
        body.light-mode .text-slate-600 { color: #6e6a66 !important; }
        body.light-mode .bg-slate-900, 
        body.light-mode .bg-slate-900\/60, 
        body.light-mode .bg-slate-900\/40 { background-color: #f5f5f4 !important; }
        body.light-mode .bg-slate-950, 
        body.light-mode .bg-slate-950\/20, 
        body.light-mode .bg-slate-950\/40 { background-color: #ffffff !important; }
        body.light-mode .border-slate-800, 
        body.light-mode .border-slate-800\/80 { border-color: #e7e5e4 !important; }
        body.light-mode .border-slate-700 { border-color: #d6d3d1 !important; }
        body.light-mode .bg-indigo-600 { background-color: #4f46e5 !important; color: #ffffff !important; }
        body.light-mode .bg-indigo-600:hover { background-color: #4338ca !important; }
        body.light-mode .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); }
        body.light-mode .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.2); }
        body.light-mode #line-gutter { background: #f5f5f4; color: #a8a29e; border-right-color: #e7e5e4; }
        body.light-mode #editor-textarea { background: #ffffff; color: #1c1917; }

        /* Gutter and Textarea layout */
        #editor-container {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
        }
        #line-gutter {
            width: 48px;
            background: #070a12;
            color: #475569;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            text-align: right;
            padding: 16px 8px 16px 0;
            user-select: none;
            overflow: hidden;
            line-height: 20px;
            border-right: 1px solid #1e293b;
        }
        #editor-textarea {
            flex: 1;
            background: #090d16;
            color: #f1f5f9;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            padding: 16px;
            border: none;
            outline: none;
            resize: none;
            line-height: 20px;
            overflow-y: auto;
            white-space: pre;
            word-wrap: normal;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <!-- Top Action Bar -->
    <div class="h-12 border-b border-slate-800/80 px-6 flex justify-between items-center bg-slate-900/60 shrink-0 select-none">
        <div class="flex items-center gap-3">
            <span class="text-lg">📝</span>
            <div class="flex flex-col">
                <h1 id="file-title" class="text-xs font-bold text-slate-200 truncate max-w-[250px]">Untitled Document</h1>
                <span id="save-status" class="text-[9px] text-slate-500 font-mono">Saved</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span id="file-telemetry" class="text-[10px] text-slate-500 font-mono mr-2">0 lines | 0 chars</span>
            <button id="btn-save" onclick="saveContent()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-[10px] py-1.5 px-3.5 rounded-lg transition-all shadow uppercase tracking-wider flex items-center gap-1 cursor-pointer">
                <span>💾</span> Save
            </button>
            <button id="btn-close" onclick="closeEditor()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-bold text-[10px] py-1.5 px-3 rounded-lg border border-slate-700 transition-all uppercase tracking-wider cursor-pointer">
                ✕ Close
            </button>
        </div>
    </div>

    <!-- Main Editing Workspace -->
    <div id="editor-container">
        <div id="line-gutter">1</div>
        <textarea id="editor-textarea" class="custom-scrollbar" placeholder="Start typing..."></textarea>
    </div>

    <script>
        const ta = document.getElementById('editor-textarea');
        const gutter = document.getElementById('line-gutter');
        const fileTitle = document.getElementById('file-title');
        const saveStatus = document.getElementById('save-status');
        const telemetry = document.getElementById('file-telemetry');

        let currentFileId = null;
        let originalContent = '';
        let isDirty = false;

        // Keep gutter scrolling synced with textarea
        ta.addEventListener('scroll', () => {
            gutter.scrollTop = ta.scrollTop;
        });

        // Update gutter line numbers and character count
        function updateGutter() {
            const val = ta.value;
            const lines = val.split('\n');
            const count = lines.length;
            
            // Build gutter HTML
            let gutterContent = '';
            for (let i = 1; i <= count; i++) {
                gutterContent += i + '<br>';
            }
            gutter.innerHTML = gutterContent;

            // Recalculate stats
            telemetry.textContent = `${count} lines | ${val.length} chars`;

            // Check dirty status
            if (val !== originalContent) {
                if (!isDirty) {
                    isDirty = true;
                    saveStatus.textContent = 'Unsaved changes*';
                    saveStatus.classList.remove('text-slate-500');
                    saveStatus.classList.add('text-amber-500');
                }
            } else {
                if (isDirty) {
                    isDirty = false;
                    saveStatus.textContent = 'Saved';
                    saveStatus.classList.remove('text-amber-500');
                    saveStatus.classList.add('text-slate-500');
                }
            }
        }

        ta.addEventListener('input', updateGutter);

        // Receive state and content from parent Multi-Map
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'STATE_UPDATE') {
                // Apply light/dark theme toggle
                if (data.theme === 'light') {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }
                
                // If a file detail is explicitly passed, load it
                if (data.nodeId && data.fileContent !== undefined) {
                    currentFileId = data.nodeId;
                    fileTitle.textContent = data.filePath || 'Document';
                    ta.value = data.fileContent;
                    originalContent = data.fileContent;
                    isDirty = false;
                    saveStatus.textContent = 'Saved';
                    saveStatus.classList.remove('text-amber-500');
                    saveStatus.classList.add('text-slate-500');
                    updateGutter();
                }
            }
        });

        // Trigger save to parent
        function saveContent() {
            if (!currentFileId) return;
            const content = ta.value;
            
            // Notify parent
            window.parent.postMessage({
                type: 'ACTION',
                action: 'SAVE_FILE_CONTENT',
                id: currentFileId,
                data: { content: content }
            }, '*');

            originalContent = content;
            isDirty = false;
            saveStatus.textContent = 'Saved';
            saveStatus.classList.remove('text-amber-500');
            saveStatus.classList.add('text-slate-500');
            updateGutter();
        }

        // Close editor
        function closeEditor() {
            window.parent.postMessage({
                type: 'ACTION',
                action: 'CLOSE_FILE_EDITOR',
                id: currentFileId
            }, '*');
        }

        // Bind Ctrl+S shortcut key
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveContent();
            }
        });
    </script>
</body>
</html>
