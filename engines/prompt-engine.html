<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prompt Chain Engine</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0f172a; color: #cbd5e1; font-family: sans-serif; }
        #container { padding: 20px; }
        h1 { color: #38bdf8; font-size: 1.5rem; margin-top: 0; }
        .node-list { display: flex; flex-direction: column; gap: 10px; }
        .node-card { background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Prompt Engine</h1>
        <p>This phase renders a linear prompt chain.</p>
        <div id="content" class="node-list"></div>
    </div>
    <script>
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'STATE_UPDATE') {
                render(event.data.state);
            }
        });

        function render(state) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            const promptRoot = state.nodes.find(n => n.type === 'prompt-root');
            if (!promptRoot) {
                container.innerHTML = '<i>No prompt-root found in this map.</i>';
                return;
            }
            
            const renderChain = (id, depth = 0) => {
                const node = state.nodes.find(n => n.id === id);
                if (!node) return;
                
                const div = document.createElement('div');
                div.className = 'node-card';
                div.style.marginLeft = `${depth * 20}px`;
                div.innerHTML = `<strong>${node.title}</strong><br><span style="font-size:0.8rem; color:#94a3b8;">${node.content}</span>`;
                container.appendChild(div);
                
                const children = state.connections.filter(c => c.from === id).map(c => c.to);
                children.forEach(cId => renderChain(cId, depth + 1));
            };
            
            renderChain(promptRoot.id);
        }
    </script>
</body>
</html>
