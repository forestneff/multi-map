<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Neff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 800: '#292524', 900: '#1c1917' },
                        emerald: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b', 950: '#022c22' },
                        amber: { 400: '#fbbf24', 500: '#f59e0b' }
                    },
                    fontFamily: {
                        serif: ['var(--font-head)', 'serif'],
                        sans: ['var(--font-body)', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --accent: #065f46;
            --bg-base: #fafaf9;
            --bg-panel: #ffffff;
            --text-main: #1c1917;
            --text-muted: #a8a29e;
            --anim-speed: 1.2s;
            --font-head: "Cormorant Garamond";
            --font-body: "Inter";
            --sidebar-width-collapsed: 5rem;
            --sidebar-width-expanded: 16rem;

            /* Integrated Clock Variables */
            --clock-accent: #10b981;
            --glass-nav: rgba(255, 255, 255, 0.85);
            --glass-panel: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-body);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: var(--font-head);
        }

        #global-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            opacity: 0.05;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* LockIt Dynamic Canvas Layer */
        #lockit-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            opacity: 0.8;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* --- REVEAL PHYSICS --- */
        .reveal-node {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity var(--anim-speed) cubic-bezier(0.2, 1, 0.3, 1),
                transform var(--anim-speed) cubic-bezier(0.2, 1, 0.3, 1);
        }

        .reveal-node.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Specific delay for sandbox to ensure it follows main content */
        #sandbox-widget.reveal-node {
            transition-delay: 0.5s;
            /* Extra visual delay on scroll reveal */
        }

        .reveal-node.exit {
            opacity: 0.05;
            transform: translateY(-20px);
            transition: opacity 2.0s ease-in-out, transform 2.0s ease-in-out;
        }

        .roll-item {
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .roll-item.revealed {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-link.active {
            color: var(--accent) !important;
            font-weight: 700;
            position: relative;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* --- TOOLKIT SIDEBAR LOGIC --- */
        #tk-sidebar {
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            /* Mobile default */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #tk-sidebar::-webkit-scrollbar {
            display: none;
        }

        @media (min-width: 768px) {
            #tk-sidebar {
                width: var(--sidebar-width-collapsed);
                height: 100%;
                overflow-y: auto;
                overflow-x: hidden;
            }

            #tk-sidebar:hover {
                width: var(--sidebar-width-expanded);
            }

            .tk-tab-btn {
                display: flex;
                align-items: center;
                height: 3.5rem;
                padding: 0 1.5rem;
                white-space: nowrap;
                overflow: hidden;
                width: 100%;
            }

            /* Collapsed State: Center icon, hide text */
            #tk-sidebar:not(:hover) .tk-tab-btn {
                justify-content: center;
                padding: 0;
            }

            #tk-sidebar:not(:hover) .tk-label-text {
                opacity: 0;
                width: 0;
                display: none;
            }

            /* Ensure icons stay visible and centered when collapsed */
            .tk-tab-btn i {
                font-size: 1.25rem;
                width: 2rem;
                text-align: center;
                flex-shrink: 0;
            }

            /* Expanded State */
            #tk-sidebar:hover .tk-tab-btn {
                justify-content: flex-start;
                gap: 1rem;
                padding-left: 2rem;
            }

            #tk-sidebar:hover .tk-label-text {
                display: inline-block;
                opacity: 1;
                width: auto;
                transition: opacity 0.3s ease 0.15s;
            }
        }

        /* Nav Container Stability */
        #tk-nav {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .tk-tab-active {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-weight: 700;
        }

        @media (min-width: 768px) {
            .tk-tab-active {
                border-left: 4px solid var(--accent);
            }
        }

        .modal-blur {
            backdrop-filter: blur(24px);
            background: rgba(28, 25, 23, 0.85);
        }

        .modal-enter {
            animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.97) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .slide-track {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 2rem;
            /* Important for Halos */
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.1) transparent;
        }

        .slide-track::-webkit-scrollbar {
            height: 6px;
        }

        .slide-track::-webkit-scrollbar-thumb {
            background: rgba(168, 162, 158, 0.3);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .slide-track {
                scrollbar-width: none;
                -webkit-mask: linear-gradient(to right, black 85%, transparent 100%);
            }

            .slide-track::-webkit-scrollbar {
                display: none;
            }
        }

        .slide-card {
            min-width: 300px;
            max-width: 400px;
            scroll-snap-align: center;
            flex-shrink: 0;
        }

        /* --- HALO SYSTEM --- */
        .halo-base {
            position: relative;
            z-index: 1;
        }

        .halo-base::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            animation-delay: var(--pulse-delay, 0s);
            pointer-events: none;
        }

        .halo-base.revealed::before {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes glowGold {
            0% {
                box-shadow: 0 0 5px 0 rgba(245, 158, 11, 0.2), 0 0 15px 2px rgba(251, 191, 36, 0.05);
                border-color: rgba(245, 158, 11, 0.4);
            }

            50% {
                box-shadow: 0 0 20px 0 rgba(245, 158, 11, 0.4), 0 0 35px 5px rgba(251, 191, 36, 0.15);
                border-color: rgba(245, 158, 11, 0.7);
            }

            100% {
                box-shadow: 0 0 5px 0 rgba(245, 158, 11, 0.2), 0 0 15px 2px rgba(251, 191, 36, 0.05);
                border-color: rgba(245, 158, 11, 0.4);
            }
        }

        .halo-gold::before {
            animation: glowGold 4s infinite ease-in-out;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        @keyframes glowGreen {
            0% {
                box-shadow: 0 0 5px 0 rgba(16, 185, 129, 0.1);
                border-color: rgba(16, 185, 129, 0.2);
            }

            50% {
                box-shadow: 0 0 15px 0 rgba(16, 185, 129, 0.25);
                border-color: rgba(16, 185, 129, 0.4);
            }

            100% {
                box-shadow: 0 0 5px 0 rgba(16, 185, 129, 0.1);
                border-color: rgba(16, 185, 129, 0.2);
            }
        }

        .halo-green::before {
            animation: glowGreen 6s infinite ease-in-out;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* BACKGROUND LAYER (Handles Masking & Radius) */
        .bg-layer {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            /* Gentle entry */
        }

        .bg-layer.visible-layer {
            opacity: 1;
        }

        /* Card Background Overlay - Softened */
        .card-bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.70), rgba(0, 0, 0, 0.1));
            z-index: 10;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .card-bg-overlay.visible-overlay {
            opacity: 1;
        }

        /* High-Vis Text Classes */
        .hydrated-text {
            color: #ffffff !important;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.85);
            position: relative;
            z-index: 20;
        }

        /* Mobile Input Optimization */
        @media (max-width: 767px) {

            input[type="text"],
            input[type="password"],
            textarea,
            select {
                font-size: 16px !important;
            }
        }

        /* Theme Overrides */
        .theme-dark {
            --bg-base: #1c1917;
            --bg-panel: #292524;
            --text-main: #fafaf9;
            --text-muted: #78716c;
            --clock-accent: #34d399;
            --glass-nav: rgba(28, 25, 23, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .theme-dark .glass-nav {
            background: rgba(28, 25, 23, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-dark .bg-stone-50 {
            background-color: #292524;
            border-color: #44403c;
        }

        .theme-dark .bg-white {
            background-color: #1c1917;
            border-color: #44403c;
        }

        .theme-dark .text-stone-900 {
            color: #fafaf9;
        }

        .theme-dark .text-stone-600 {
            color: #d6d3d1;
        }

        .theme-dark .text-stone-500 {
            color: #a8a29e;
        }

        .theme-dark .text-stone-400 {
            color: #78716c;
        }
    </style>
</head>

<body class="overflow-x-hidden">

    <canvas id="lockit-bg"></canvas>

    <div id="global-bg"></div>

    <nav class="fixed top-0 w-full z-50 glass-nav h-20 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <div
                    class="w-10 h-10 bg-stone-900 text-stone-50 flex items-center justify-center font-serif text-xl font-bold rounded-full shadow-lg">
                    FN</div>
                <div class="hidden sm:flex flex-col">
                    <span class="font-serif text-xl font-bold tracking-tight text-stone-900">FOREST NEFF</span>
                    <span class="text-[9px] uppercase tracking-[0.3em] text-stone-400 font-bold mt-1">Systems
                        Nexus</span>
                </div>
            </div>

            <div class="flex gap-4 lg:gap-8 items-center">
                <div id="nav-container" class="hidden lg:flex gap-6"></div>
                <div class="h-6 w-px bg-stone-200 hidden lg:block"></div>
                <button onclick="app.toggleLogin()"
                    class="w-9 h-9 rounded-full bg-stone-100 flex items-center justify-center text-stone-400 hover:text-stone-900 transition-all shadow-sm">
                    <i class="fa-solid fa-fingerprint text-base"></i>
                </button>
                <button class="lg:hidden text-stone-800" onclick="app.toggleMobileMenu()"><i
                        class="fa-solid fa-bars-staggered text-2xl"></i></button>
            </div>
        </div>
        <div id="mobile-nav" class="hidden bg-stone-100 border-b border-stone-200 p-8 flex flex-col gap-6 lg:hidden">
        </div>
    </nav>

    <div id="portal-canvas" class="relative z-10 w-full flex flex-col"></div>

    <section id="sandbox-widget" class="relative py-20 reveal-node z-0 opacity-0">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col items-center mb-10 text-center">
                <div
                    class="inline-flex items-center gap-3 px-5 py-2 mb-6 border border-emerald-200 bg-emerald-50 text-emerald-800 text-[10px] font-bold uppercase tracking-[0.25em] rounded-full shadow-sm font-sans">
                    <i class="fa-solid fa-cube"></i> <span>Prototype</span>
                </div>
                <h2 class="font-serif text-4xl md:text-5xl font-bold text-stone-900 tracking-tight">System Sandbox</h2>
            </div>

            <div
                class="w-full h-[600px] rounded-[3rem] border border-stone-200 shadow-2xl relative bg-stone-50 overflow-hidden transform transition-all hover:shadow-3xl">
                <div
                    class="absolute top-0 left-0 w-full h-14 bg-white/90 backdrop-blur border-b border-stone-200 flex items-center justify-between px-6 z-10">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-400"></div>
                        <div class="w-3 h-3 rounded-full bg-amber-400"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
                    </div>

                    <div class="flex-1 px-4 text-center">
                        <select id="sandbox-selector" onchange="app.switchSandbox(this.value)"
                            class="bg-transparent text-[10px] font-bold uppercase tracking-widest text-stone-500 font-sans focus:outline-none cursor-pointer hover:text-emerald-700 text-center w-full md:w-auto">
                            <option value="default">Woo Way (Default)</option>
                        </select>
                    </div>

                    <div class="w-12"></div>
                </div>

                <div id="sandbox-iframe-container" class="w-full h-full pt-14">
                    <iframe id="sandbox-frame" src="" class="w-full h-full bg-white" frameborder="0"
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; microphone; camera; display-capture"
                        allowfullscreen></iframe>
                </div>

                <div id="sandbox-gallery-container" class="hidden w-full h-full pt-14 bg-stone-50 overflow-y-auto p-8">
                    <div id="sandbox-gallery-grid" class="columns-1 md:columns-3 gap-4 space-y-4">
                    </div>
                </div>

                <!-- ADDED: Dedicated LockIt Widget Container with Interactive Controls -->
                <div id="sandbox-lockit-container"
                    class="hidden w-full h-full bg-stone-900 relative group overflow-hidden">
                    <canvas id="sandbox-lockit-canvas" class="w-full h-full block"></canvas>

                    <!-- HUD: Date & Status -->
                    <div
                        class="absolute bottom-6 left-6 text-emerald-500/50 font-mono text-[10px] uppercase tracking-widest pointer-events-none select-none z-10 transition-opacity duration-300 group-hover:text-emerald-500/80">
                        <div><i class="fa-solid fa-server mr-2"></i>System: Online</div>
                        <div><i class="fa-solid fa-code-branch mr-2"></i>Mode: Interactive_v1</div>
                        <div id="lockit-widget-time" class="text-emerald-300 font-bold mt-1 text-sm">--:--:--</div>
                        <div id="lockit-widget-date" class="text-emerald-500/60 text-xs">--/--/----</div>
                    </div>

                    <!-- CONTROL DECK -->
                    <div
                        class="absolute top-6 right-6 flex flex-col gap-3 items-end z-20 transition-transform duration-500 translate-x-4 group-hover:translate-x-0">

                        <!-- Date Picker -->
                        <div
                            class="bg-stone-950/80 backdrop-blur-md border border-emerald-500/20 rounded-2xl p-4 shadow-2xl flex flex-col gap-2 w-56">
                            <label
                                class="text-[9px] uppercase tracking-widest text-emerald-600 font-bold font-mono flex justify-between">
                                <span>Temporal Target</span>
                                <i class="fa-regular fa-calendar"></i>
                            </label>
                            <input type="datetime-local" id="lockit-date-input"
                                onchange="LockItWidget.jumpToDate(this.value)"
                                class="bg-stone-900/50 text-emerald-100 text-[10px] font-mono focus:outline-none border border-emerald-500/30 rounded-lg px-2 py-1.5 w-full uppercase cursor-pointer hover:border-emerald-500/60 transition-colors">
                        </div>

                        <!-- Shuttle Dial -->
                        <div
                            class="bg-stone-950/80 backdrop-blur-md border border-emerald-500/20 rounded-2xl p-4 shadow-2xl flex flex-col gap-3 w-56">
                            <div class="flex justify-between items-center border-b border-emerald-500/10 pb-2">
                                <label
                                    class="text-[9px] uppercase tracking-widest text-emerald-600 font-bold font-mono">Dilation</label>
                                <span id="lockit-speed-display"
                                    class="text-[9px] text-emerald-400 font-mono bg-emerald-900/20 px-1.5 py-0.5 rounded border border-emerald-500/20 min-w-[30px] text-center">PAUSED</span>
                            </div>

                            <div class="relative h-6 flex items-center">
                                <!-- Center Detent Marker -->
                                <div class="absolute left-1/2 top-0 bottom-0 w-px bg-emerald-500/30 z-0"></div>
                                <input type="range" id="lockit-shuttle" min="-4" max="4" step="0.01" value="0"
                                    oninput="LockItWidget.setSpeed(this.value)"
                                    onmouseup="LockItWidget.snapToZero(this)"
                                    class="relative z-10 w-full h-1.5 bg-stone-800 rounded-full appearance-none cursor-pointer accent-emerald-500 focus:outline-none hover:bg-stone-700 transition-colors">
                            </div>

                            <div
                                class="flex justify-between text-[8px] text-emerald-800 font-bold font-mono uppercase tracking-wider px-1">
                                <span>Rev</span>
                                <span>0</span>
                                <span>Fwd</span>
                            </div>
                        </div>

                        <!-- Reset Button -->
                        <button onclick="LockItWidget.resetNow()"
                            class="group/btn flex items-center gap-2 px-4 py-2 bg-stone-950/80 backdrop-blur border border-emerald-500/20 rounded-xl text-emerald-600 text-[9px] uppercase tracking-widest hover:bg-emerald-900/20 hover:text-emerald-400 hover:border-emerald-500/50 transition-all font-mono shadow-lg">
                            <span>Sync Present</span>
                            <i class="fa-solid fa-rotate-left group-hover/btn:-rotate-90 transition-transform"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

                    </div>
                    <button onclick="app.toggleToolkitNav()"

                </div>

                <nav id="tk-nav" class="hidden md:flex flex-col gap-2 w-full transition-all">
                </nav>

    <script>
        // --- LOCKIT DYNAMIC ENGINE v2.6 (BACKGROUND) ---
        const LockItEngine = {
            canvas: null, ctx: null, lastTime: 0,
            clockTime: new Date(), visualTime: new Date(),
            lastScrollY: 0, isScrubbing: false, scrubTimeout: null,
            config: {
                dilation: 1.0,
                mode: 'astrolabe',
                scrollImpact: 500000,
                smoothFactor: 0.08
            },

            init: function () {
                this.canvas = document.getElementById('lockit-bg');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());

                window.addEventListener('scroll', () => {
                    this.isScrubbing = true;
                    const currentY = window.scrollY;

                    if (currentY === 0) {
                        this.clockTime = new Date();
                    } else {
                        const delta = currentY - this.lastScrollY;
                        const timeShift = delta * -this.config.scrollImpact;
                        this.clockTime = new Date(this.clockTime.getTime() + timeShift);
                    }
                    this.lastScrollY = currentY;
                    clearTimeout(this.scrubTimeout);
                    this.scrubTimeout = setTimeout(() => { this.isScrubbing = false; }, 150);
                });
                this.animate();
            },

            resize: function () {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            animate: function (now) {
                const delta = now - this.lastTime || 0;
                this.lastTime = now;

                if (this.config.mode === 'astrolabe') {
                    this.config.scrollImpact = 500000;
                } else {
                    this.config.scrollImpact = 1000;
                }

                if (!this.isScrubbing) {
                    this.clockTime = new Date(this.clockTime.getTime() + delta * this.config.dilation);
                }

                const diff = this.clockTime.getTime() - this.visualTime.getTime();
                if (Math.abs(diff) > 10) {
                    this.visualTime = new Date(this.visualTime.getTime() + (diff * this.config.smoothFactor));
                } else {
                    this.visualTime = new Date(this.clockTime);
                }

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;
                const radius = Math.min(this.canvas.width, this.canvas.height) * 0.28;

                this.ctx.save();
                this.ctx.translate(cx, cy);
                if (this.config.mode === 'astrolabe') this.drawAstrolabe(radius, this.visualTime);
                else this.drawAnalog(radius, this.visualTime);
                this.ctx.restore();
                requestAnimationFrame((n) => this.animate(n));
            },

            drawAnalog: function (radius, date) {
                const accent = getComputedStyle(document.documentElement).getPropertyValue('--clock-accent').trim();
                const textCol = document.body.classList.contains('theme-dark') ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.04)';
                this.ctx.strokeStyle = textCol;
                for (let i = 0; i < 60; i++) {
                    const ang = (i / 60) * Math.PI * 2;
                    const len = i % 5 === 0 ? 25 : 10;
                    this.ctx.beginPath();
                    this.ctx.moveTo(Math.cos(ang) * (radius - len), Math.sin(ang) * (radius - len));
                    this.ctx.lineTo(Math.cos(ang) * radius, Math.sin(ang) * radius);
                    this.ctx.stroke();
                }
                const h = (date.getHours() % 12) + date.getMinutes() / 60;
                const m = date.getMinutes();
                const s = date.getSeconds() + date.getMilliseconds() / 1000;
                this.drawHand((h / 12) * Math.PI * 2, radius * 0.55, 5, textCol);
                this.drawHand((m / 60) * Math.PI * 2, radius * 0.78, 3, textCol);
                this.drawHand((s / 60) * Math.PI * 2, radius * 0.88, 1.5, accent);
            },

            drawAstrolabe: function (radius, date) {
                const themeColor = document.body.classList.contains('theme-dark') ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)';

                this.ctx.strokeStyle = themeColor;
                this.ctx.lineWidth = 1;
                for (let i = 0; i < 12; i++) {
                    const ang = (i / 12) * Math.PI * 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(Math.cos(ang) * (radius * 0.3), Math.sin(ang) * (radius * 0.3));
                    this.ctx.lineTo(Math.cos(ang) * (radius * 1.2), Math.sin(ang) * (radius * 1.2));
                    this.ctx.stroke();
                }

                const planets = [
                    { name: 'Moon', period: 28, r: 0.35, color: '#e5e7eb', size: 6 },
                    { name: 'Mercury', period: 88, r: 0.45, color: '#9ca3af', size: 4 },
                    { name: 'Venus', period: 225, r: 0.55, color: '#facc15', size: 5 },
                    { name: 'Sun', period: 365, r: 0.65, color: '#fbbf24', size: 10, glow: true },
                    { name: 'Mars', period: 687, r: 0.75, color: '#ef4444', size: 5 },
                    { name: 'Jupiter', period: 4333, r: 0.9, color: '#fb923c', size: 8 },
                    { name: 'Saturn', period: 10759, r: 1.05, color: '#eab308', size: 7 }
                ];

                planets.forEach(p => {
                    const orbitR = radius * p.r;
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = themeColor;
                    this.ctx.arc(0, 0, orbitR, 0, Math.PI * 2);
                    this.ctx.stroke();

                    const dayOfYear = (date.getTime() / (1000 * 3600 * 24));
                    const ang = (dayOfYear / p.period) * 2 * Math.PI;
                    const px = Math.cos(ang) * orbitR;
                    const py = Math.sin(ang) * orbitR;

                    this.ctx.beginPath();
                    this.ctx.fillStyle = p.color;
                    if (p.glow) { this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color; }
                    else { this.ctx.shadowBlur = 0; }
                    this.ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                const textCol = document.body.classList.contains('theme-dark') ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.06)';
                const h = (date.getHours() % 12) + date.getMinutes() / 60;
                const m = date.getMinutes();
                this.drawHand((h / 12) * Math.PI * 2, radius * 0.4, 4, textCol);
                this.drawHand((m / 60) * Math.PI * 2, radius * 0.6, 2, textCol);
            },

            drawHand: function (ang, len, width, color) {
                this.ctx.beginPath(); this.ctx.lineWidth = width; this.ctx.strokeStyle = color; this.ctx.lineCap = 'round';
                this.ctx.moveTo(0, 0); this.ctx.lineTo(Math.cos(ang - Math.PI / 2) * len, Math.sin(ang - Math.PI / 2) * len);
                this.ctx.stroke();
            }
        };

        // --- UPDATED: LOCKIT WIDGET (INTERACTIVE) ---
        const LockItWidget = {
            canvas: null, ctx: null, active: false, reqId: null,
            visualTime: new Date(),
            dilation: 0, // Current speed multiplier (starts paused)
            lastFrameTime: 0,

            init: function () {
                this.canvas = document.getElementById('sandbox-lockit-canvas');
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');

                // Set initial visual time to Now if not set
                if (!this.visualTime) this.visualTime = new Date();

                // Initialize Controls
                this.resetNow();

                // Set dimensions
                this.resize();
                window.addEventListener('resize', () => { if (this.active) this.resize() });

                this.active = true;
                this.lastFrameTime = performance.now();
                this.animate(this.lastFrameTime);
            },

            stop: function () {
                this.active = false;
                if (this.reqId) cancelAnimationFrame(this.reqId);
            },

            resize: function () {
                if (!this.canvas) return;
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            },

            // --- INPUT HANDLERS ---

            setSpeed: function (val) {
                const v = parseFloat(val);
                // Logarithmic Scale: 0 is stop, 1 is 1x, 4 is 10,000x
                // Formula: sign * 10 ^ (|val| - 1) * (some base constant if needed)
                // We want 0 input = 0 speed.

                if (Math.abs(v) < 0.1) {
                    this.dilation = 0;
                    document.getElementById('lockit-speed-display').innerText = "PAUSED";
                    document.getElementById('lockit-speed-display').className = "text-[9px] text-stone-500 font-mono bg-stone-900/20 px-1.5 py-0.5 rounded border border-stone-500/20 min-w-[30px] text-center";
                } else {
                    // Exponential curve
                    const power = Math.abs(v);
                    // Base speed: Realtime (1x)
                    // If val is 1, speed = 1x. If val is 4, speed = 10,000x
                    const multiplier = Math.pow(10, power - 1); // v=1 -> 10^0 = 1. v=4 -> 10^3 = 1000... let's boost it

                    // Let's adjust so max speed (4) is roughly 100,000x (approx 1 day per second)
                    // 1 day = 86400 seconds. 
                    // Let's use simple exponential: dilation = sign * 10^|val|

                    this.dilation = Math.sign(v) * Math.pow(10, power);

                    // Formatting display
                    let label = Math.abs(this.dilation).toFixed(1) + "x";
                    if (Math.abs(this.dilation) > 100) label = Math.abs(this.dilation).toFixed(0) + "x";
                    if (Math.abs(this.dilation) > 1000) label = (Math.abs(this.dilation) / 1000).toFixed(1) + "kx";

                    const colorClass = v > 0 ? "text-emerald-400 bg-emerald-900/20 border-emerald-500/20" : "text-amber-400 bg-amber-900/20 border-amber-500/20";

                    document.getElementById('lockit-speed-display').innerText = (v < 0 ? "-" : "") + label;
                    document.getElementById('lockit-speed-display').className = `text-[9px] font-mono px-1.5 py-0.5 rounded border min-w-[30px] text-center ${colorClass}`;
                }
            },

            // "Snap back" effect for the shuttle dial (optional, can remove if you want 'cruise control')
            snapToZero: function (el) {
                // For a shuttle control, usually it snaps back to 0 (pause) or 1 (realtime)
                // Let's leave it where the user put it for "cruise control" behavior, 
                // but if it's very close to 0, snap it.
                if (Math.abs(el.value) < 0.25) {
                    el.value = 0;
                    this.setSpeed(0);
                }
            },

            jumpToDate: function (isoString) {
                if (!isoString) return;
                this.visualTime = new Date(isoString);
            },

            resetNow: function () {
                this.visualTime = new Date();
                this.dilation = 1; // Default to realtime

                // Update UI
                const shuttle = document.getElementById('lockit-shuttle');
                if (shuttle) {
                    shuttle.value = 0; // Set visual slider to "10^0 = 1x" position... actually our scale:
                    // Our scale: dilation = 10^val. So val should be 0 for 1x? 
                    // Wait, logic in setSpeed: dilation = 10^val. 
                    // If val=0 -> dilation=1. 
                    // Let's adjust setSpeed logic slightly to handle "Paused" better.
                    // Correcting Logic: Let's map slider 0 to PAUSE. 

                    // RE-MAPPING LOGIC:
                    // Slider 0 = Speed 0.
                    // Slider 0.1 to 4 = Speed 1x to 100,000x.
                    // Let's just manually set UI to paused for now.
                    shuttle.value = 0;
                    this.setSpeed(0);
                }

                // Update Date Input value (needs YYYY-MM-DDTHH:MM format)
                this.updateDateInput();
            },

            updateDateInput: function () {
                const inp = document.getElementById('lockit-date-input');
                if (!inp) return;

                // Format Date for Input
                // Note: manual ISO string construction to respect local time zone is annoying, 
                // but standard .toISOString() is UTC. We likely want local time.
                const d = this.visualTime;
                const offset = d.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(d - offset)).toISOString().slice(0, 16);
                inp.value = localISOTime;
            },

            animate: function (now) {
                if (!this.active) return;

                const delta = now - this.lastFrameTime;
                this.lastFrameTime = now;

                // Apply Time Dilation
                // delta is ms since last frame (e.g. 16ms)
                // dilation is multiplier
                if (this.dilation !== 0) {
                    const timeShift = delta * this.dilation;
                    this.visualTime = new Date(this.visualTime.getTime() + timeShift);
                }

                // Update Debug Text & Input (Throttle input update?)
                const timeEl = document.getElementById('lockit-widget-time');
                const dateEl = document.getElementById('lockit-widget-date');

                if (timeEl) timeEl.innerText = this.visualTime.toLocaleTimeString();
                if (dateEl) dateEl.innerText = this.visualTime.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

                // Only update the input value occasionally or when paused to avoid blocking user interaction
                // Or just don't update input value continuously (it's a "Jump To" control, not a display)
                // We will leave the input alone while running, users look at the text display.

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;
                const radius = Math.min(this.canvas.width, this.canvas.height) * 0.35;

                this.drawHighFidelityAstrolabe(cx, cy, radius, this.visualTime);

                this.reqId = requestAnimationFrame((t) => this.animate(t));
            },

            // High Fidelity Rendering (Same as before)
            drawHighFidelityAstrolabe: function (cx, cy, radius, date) {
                this.ctx.save();
                this.ctx.translate(cx, cy);

                // Grid Lines
                this.ctx.strokeStyle = 'rgba(16, 185, 129, 0.1)'; // Emerald
                this.ctx.lineWidth = 1;

                // Zodiac Rings
                for (let i = 0; i < 3; i++) {
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, radius * (0.8 + (i * 0.2)), 0, Math.PI * 2);
                    this.ctx.stroke();
                }

                // Sector Lines
                for (let i = 0; i < 12; i++) {
                    const ang = (i / 12) * Math.PI * 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(Math.cos(ang) * (radius * 0.2), Math.sin(ang) * (radius * 0.2));
                    this.ctx.lineTo(Math.cos(ang) * (radius * 1.4), Math.sin(ang) * (radius * 1.4));
                    this.ctx.stroke();
                }

                const planets = [
                    { name: 'Moon', period: 28, r: 0.35, color: '#e5e7eb', size: 8 },
                    { name: 'Mercury', period: 88, r: 0.45, color: '#9ca3af', size: 6 },
                    { name: 'Venus', period: 225, r: 0.55, color: '#facc15', size: 7 },
                    { name: 'Sun', period: 365, r: 0.65, color: '#fbbf24', size: 14, glow: true },
                    { name: 'Mars', period: 687, r: 0.75, color: '#ef4444', size: 7 },
                    { name: 'Jupiter', period: 4333, r: 0.9, color: '#fb923c', size: 12 },
                    { name: 'Saturn', period: 10759, r: 1.05, color: '#eab308', size: 10 }
                ];

                planets.forEach(p => {
                    const orbitR = radius * p.r;
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    this.ctx.arc(0, 0, orbitR, 0, Math.PI * 2);
                    this.ctx.stroke();

                    const dayOfYear = (date.getTime() / (1000 * 3600 * 24));
                    const ang = (dayOfYear / p.period) * 2 * Math.PI;
                    const px = Math.cos(ang) * orbitR;
                    const py = Math.sin(ang) * orbitR;

                    this.ctx.beginPath();
                    this.ctx.fillStyle = p.color;
                    this.ctx.shadowBlur = p.glow ? 20 : 0;
                    this.ctx.shadowColor = p.color;
                    this.ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    this.ctx.fill();

                    // Orbit Label
                    this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    this.ctx.font = '8px monospace';
                    this.ctx.fillText(p.name, px + 10, py);

                    this.ctx.shadowBlur = 0;
                });

                this.ctx.restore();
            }
        };

        const defaults = {

            // --- SURGICAL METADATA HYDRATION (No "Double Take") ---
            hydratePortfolio: async function () {
                const CORS_PROXY = "https://api.allorigins.win/get?url=";

                for (let i = 0; i < this.state.portfolio.length; i++) {
                    const item = this.state.portfolio[i];
                    if (!item.link || item.link === '#' || item.hydrated) continue;

                    // Add cache busting param to proxy request
                    const proxyUrl = CORS_PROXY + encodeURIComponent(item.link) + "&timestamp=" + new Date().getTime();

                    try {
                        const res = await fetch(proxyUrl);
                        if (!res.ok) throw new Error("Proxy failed");

                        const data = await res.json();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(data.contents, "text/html");

                        // Extract Metadata
                        const ogImage = doc.querySelector('meta[property="og:image"]')?.content ||
                            doc.querySelector('meta[name="twitter:image"]')?.content ||
                            doc.querySelector('link[rel="image_src"]')?.href;

                        // Only overwrite icon if not hardcoded (1,7,8,9)
                        let cleanIcon = null;
                        if (![5, 6, 9, 10].includes(item.id)) {
                            let iconLink = doc.querySelector('link[rel="icon"]')?.href ||
                                doc.querySelector('link[rel="shortcut icon"]')?.href ||
                                doc.querySelector('link[rel="apple-touch-icon"]')?.href;
                            if (iconLink) {
                                try {
                                    const urlObj = new URL(item.link);
                                    if (iconLink.startsWith('http')) cleanIcon = iconLink;
                                    else if (iconLink.startsWith('//')) cleanIcon = 'https:' + iconLink;
                                    else cleanIcon = urlObj.origin + (iconLink.startsWith('/') ? '' : '/') + iconLink;
                                } catch (e) { }
                            }
                        }

                        // DOM UPDATE (Surgical)
                        // Use requestAnimationFrame to ensure updates happen in paint cycle
                        requestAnimationFrame(() => {
                            const cards = document.querySelectorAll(`div[data-pid="${item.id}"]`);
                            cards.forEach(card => {
                                // TARGET THE BG LAYER, NOT THE CARD
                                const bgLayer = card.querySelector('.bg-layer');
                                if (ogImage && bgLayer) {
                                    const tempImg = new Image();
                                    tempImg.onload = () => {
                                        item.metaImage = ogImage; // Save to state
                                        bgLayer.style.backgroundImage = `url('${ogImage}')`;
                                        bgLayer.style.backgroundSize = 'cover';
                                        bgLayer.style.backgroundPosition = 'center';
                                        bgLayer.classList.add('visible-layer'); // Fade In

                                        // Add Overlay if missing
                                        if (!card.querySelector('.card-bg-overlay')) {
                                            const ov = document.createElement('div');
                                            ov.className = 'card-bg-overlay';
                                            card.prepend(ov);
                                            setTimeout(() => ov.classList.add('visible-overlay'), 50);
                                        } else {
                                            card.querySelector('.card-bg-overlay').classList.add('visible-overlay');
                                        }

                                        // Update text colors
                                        const title = card.querySelector('h4');
                                        if (title) title.classList.add('hydrated-text');
                                        const desc = card.querySelector('p') || card.querySelector('span');
                                        if (desc) desc.classList.add('hydrated-text');
                                    };
                                    tempImg.src = ogImage; // Preload
                                }

                                if (cleanIcon) {
                                    item.metaIcon = cleanIcon; // Save to state
                                    const iconContainer = card.querySelector('.w-10, .w-14'); // Find icon container
                                    if (iconContainer) {
                                        iconContainer.innerHTML = `<img src="${cleanIcon}" class="w-full h-full object-cover">`;
                                    }
                                }
                            });
                        });

                        item.hydrated = true;
                        app.commitState(); // DEBOUNCED SAVE

                    } catch (e) {
                        // Fallback for Medium / Google Photos if proxy blocked
                        if (item.link.includes('medium.com') || item.link.includes('photos.app.goo.gl')) {
                            try {
                                const urlObj = new URL(item.link);
                                const s2Icon = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=128`;

                                if (![5, 6, 9, 10].includes(item.id)) {
                                    item.metaIcon = s2Icon;
                                }

                                item.hydrated = true;
                                app.commitState(); // DEBOUNCED SAVE

                                requestAnimationFrame(() => {
                                    const cards = document.querySelectorAll(`div[data-pid="${item.id}"]`);
                                    cards.forEach(card => {
                                        const iconContainer = card.querySelector('.w-10, .w-14');
                                        if (iconContainer && item.metaIcon) iconContainer.innerHTML = `<img src="${item.metaIcon}" class="w-full h-full object-cover">`;
                                    });
                                });
                            } catch (err) { }
                        }
                    }
                }
            },

            refreshDecks: function (key) {
                const p = this.state.personas[key];
                const archive = document.getElementById(`archive-${key}`);
                const isHidden = archive.classList.contains('hidden');
                const expanded = isHidden;

                const container = document.getElementById(`stage-${key}`);
                container.innerHTML = this.getStageMarkup(key, p, expanded);

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            const children = entry.target.querySelectorAll('.roll-item');
                            children.forEach((c, i) => setTimeout(() => c.classList.add('revealed'), i * 50));
                        }
                    });
                }, { threshold: 0.1 });
                observer.observe(container);
            },

            formatTitle: function (text) {
                return text.replace(/Harmony/g, '<span class="italic text-emerald-800">Harmony</span>').replace(/Connectivity/g, '<span class="italic">Connectivity</span>').replace(/Efficiency/g, '<span class="italic text-emerald-800">Efficiency</span>').replace(/Identity/g, '<span class="italic text-emerald-800">Identity</span>').replace(/Planetary/g, '<span class="italic text-emerald-800">Planetary</span>').replace(/Musings/g, '<span class="italic text-emerald-800">Musings</span>');

                    sel.add(opt);
                }

                // 3. ADD OTHERS
                this.state.portfolio.forEach(p => {
                    // Skip Woo Way (already added) and invalid/medium links
                    if (p.id !== 1 && p.link && p.link !== '#' && !p.link.includes('medium.com')) {
                        const opt = document.createElement('option');
                        opt.value = JSON.stringify({ url: p.sandboxLink || p.link, id: p.id });
                        opt.text = p.title;
                        sel.add(opt);
                    }
                });

                // Set Default to LockIt
                sel.value = "lockit_local";
                this.switchSandbox("lockit_local");

                // Reveal The Widget
                const widget = document.getElementById('sandbox-widget');
                if (widget) {
                    widget.classList.remove('opacity-0');
                    if (this.observer) this.observer.observe(widget);
                }
            },

            /* UTILITIES */
            toggleCat: function (i, k) { const p = this.state.portfolio[i]; if (p.cats.includes(k)) p.cats = p.cats.filter(c => c !== k); else p.cats.push(k); },
            addNode: function () { this.state.portfolio.unshift({ id: Date.now(), title: "New Node", cats: ["nexus"], type: "Portal", link: "#", icon: "fa-rocket", hasImages: false, assets: [], featured: false }); this.switchToolkitTab('repository'); },
            removeNode: function (i) { this.state.portfolio.splice(i, 1); this.switchToolkitTab('repository'); },
            addAsset: function (k) { this.state.galleries[k].unshift({ id: Date.now(), title: "New Visual", type: "Asset", featured: false, image: "https://via.placeholder.com/800x600" }); this.switchToolkitTab('galleries'); },
            removeAsset: function (k, idx) { this.state.galleries[k].splice(idx, 1); this.switchToolkitTab('galleries'); },
            createPersona: function () { const id = 'p_' + Date.now(); this.state.personas[id] = { label: "New", tag: "Identity", title: "New Protocol", desc: "Brief.", icon: "fa-rocket", pTitle: "Stage", pContent: "Content.", focus: "None", metric: "None", template: "text" }; this.renderNavigation(); this.switchToolkitTab('persona'); this.openPersonaEditor(id); },
            commitState: function () { localStorage.setItem(this.currentVersion, JSON.stringify(this.state)); location.reload(); },
            toggleMobileMenu: function () { document.getElementById('mobile-nav').classList.toggle('hidden'); },

            setupScrollObserver: function () {
                if (this.observer) this.observer.disconnect(); // Clean old observers

                const options = { threshold: 0.25 };
                this.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const target = entry.target;
                        if (entry.isIntersecting) {
                            target.classList.add('visible'); target.classList.remove('exit');
                            const id = target.id.split('-')[1];
                            if (id && this.state.personas[id]) { document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active')); const btn = document.getElementById(`nav-link-${id}`); if (btn) btn.classList.add('active'); }
                        } else {
                            if (entry.boundingClientRect.top < 0) target.classList.add('exit');
                            target.classList.remove('visible', 'active');
                        }
                        const children = target.querySelectorAll('.roll-item');
                        children.forEach((c, i) => { if (entry.isIntersecting) setTimeout(() => c.classList.add('revealed'), i * 80); });
                    });
                }, options);
                document.querySelectorAll('.reveal-node').forEach(el => this.observer.observe(el));
            },
            scrollToPersona: function (k) { const el = document.getElementById(`section-${k}`); if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); },
            setupGlobalEvents: function () {
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        const projEdit = document.getElementById('project-editor-overlay');
                        const personaEdit = document.getElementById('persona-editor-overlay');
                        if (!projEdit.classList.contains('hidden')) this.closeProjectEditor();
                        else if (!personaEdit.classList.contains('hidden')) this.closePersonaEditor();
                        else {
                            document.getElementById('asset-selector-modal').classList.add('hidden');
                            document.getElementById('project-modal').classList.add('hidden');
                            document.getElementById('toolkit-modal').classList.add('hidden');
                            document.getElementById('login-form').classList.add('hidden');
                        }
                    }
                    if (e.key === 'Enter') {
                        const loginForm = document.getElementById('login-form');
                        if (!loginForm.classList.contains('hidden')) {
                            app.checkLogin();
                        }
                    }
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>

</html>
