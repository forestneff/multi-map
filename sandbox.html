<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Map Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="multi-map-ui.css">

    <!-- CRITICAL LOAD ORDER -->
    <script src="multi-map-library.js"></script>
    <script src="auth.js" type="module"></script>
    <script src="multi-map-rules.js"></script>
    <script src="multi-map-core.js"></script>
    <script src="phase-engines.js"></script>
    <script src="multi-map-sandbox.js"></script>
    <script src="multi-map-tutorials.js"></script>
    <script src="multi_map_ai_engine.js"></script>
</head>

<body class="overflow-hidden bg-slate-950 select-none">
    <nav
        class="h-14 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center px-2 md:px-4 z-50 relative backdrop-blur w-full gap-2 md:gap-4">
        <!-- Identity & Status -->
        <div class="flex items-center gap-2 md:gap-3 shrink-0">
            <!-- Universal Hamburger Menu -->
            <button id="btn-sidebar-toggle"
                class="p-1 md:p-1.5 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                onclick="SC.toggleSidebar()" title="Toggle Inspector">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <!-- M-M Home Link -->
            <a href="index.html"
                class="w-7 h-7 md:w-8 md:h-8 bg-sky-600 rounded flex items-center justify-center text-white font-black shadow-lg shadow-sky-900/50 text-[10px] md:text-xs no-underline hover:bg-sky-500 transition-colors shrink-0">M-M</a>

            <div class="flex flex-col">
                <!-- Desktop Title -->
                <span id="map-title"
                    class="text-sm font-bold text-slate-200 leading-none hidden sm:block mt-0.5">Multi-Map</span>
                <!-- Mobile Stacked Title -->
                <div
                    class="flex flex-col sm:hidden text-[9px] font-black text-slate-200 leading-tight uppercase tracking-widest mt-0.5">
                    <span>Meta</span>
                    <span>Mind</span>
                </div>
                <div class="hidden sm:flex gap-2 mt-1">
                    <span id="save-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Local
                    </span>
                    <span id="host-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Host Offline
                    </span>
                </div>
            </div>
        </div>

        <!-- Central Search Bar -->
        <div class="flex-1 max-w-md relative z-50">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" id="map-search-input" placeholder="Search map nodes..."
                    class="w-full bg-slate-950/60 border border-slate-700 text-slate-200 pl-8 pr-3 py-1.5 md:py-2 rounded-full text-xs md:text-sm outline-none focus:border-sky-500 focus:bg-slate-900 transition-colors placeholder:text-slate-500 shadow-inner">
            </div>
            <div id="map-search-results"
                class="hidden absolute top-full mt-2 left-0 right-0 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl max-h-64 overflow-y-auto custom-scrollbar flex-col gap-1 p-2 backdrop-blur-md">
            </div>
        </div>

        <!-- Responsive Toolbar -->
        <div class="flex items-center relative shrink-0 gap-2">
            <!-- Profile Button -->
            <button id="btn-profile"
                onclick="toggleDrawer('profile-drawer')"
                class="p-2 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                title="Profile & Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </button>

            <!-- Mobile Menu Toggle -->
            <!-- Data Manager Button (Replaces old Tools menu) -->
            <button
                id="btn-data-manager"
                onclick="toggleDrawer('data-manager-drawer')"
                class="p-2 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                title="Data Manager">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1.5 3 3 3h10c1.5 0 3-1 3-3V7m-9 5h4m-4-4h4"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7c0-2 1.5-3 3-3h10c1.5 0 3 1 3 3M4 7l8 3 8-3"></path>
                </svg>
            </button>
    </nav>

    <div id="stage">
        <!-- Profile Drawer -->
        <div id="profile-drawer" class="absolute top-0 right-0 h-full w-[350px] max-w-full bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col pointer-events-auto">
            <div class="flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950/50">
                <h2 class="text-white font-black flex items-center gap-2"><span>👤</span> Profile & Settings</h2>
                <button onclick="document.getElementById('profile-drawer').classList.add('translate-x-full');" class="text-slate-500 hover:text-white transition-colors">✕</button>
            </div>
            <div id="profile-content" class="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-6">
                <!-- Injected via Auth manager -->
            </div>
        </div>

        <!-- Data Manager Drawer -->
        <div id="data-manager-drawer" class="absolute top-0 right-0 h-full w-[350px] max-w-full bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col pointer-events-auto">
            <div class="flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950/50">
                <h2 class="text-white font-black flex items-center gap-2"><span>📚</span> Data Manager</h2>
                <button onclick="document.getElementById('data-manager-drawer').classList.add('translate-x-full');" class="text-slate-500 hover:text-white transition-colors">✕</button>
            </div>
            <div id="data-manager-content" class="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-6">
                <!-- Injected via Auth/Data manager -->
            </div>
        </div>

        <!-- New Universal Rail & Slide-out Inspector -->
        <div id="sidebar"
            class="border-r border-slate-800 flex z-40 bg-slate-900/95 backdrop-blur-md shrink-0 transition-all duration-300 overflow-hidden">

            <!-- Narrow Tool Rail (Always visible) -->
            <div id="phase-selection-area"
                class="w-[56px] shrink-0 flex flex-col items-center py-4 gap-2 bg-slate-950 border-r border-slate-800 z-10 shadow-lg h-full">
                <button id="btn-phase-map"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all active flex items-center justify-center"
                    onclick="SC.setView('map')" title="Map Phase">🗺️</button>
                <button id="btn-phase-orbital"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('orbital')" title="Orbital Focus">🔮</button>
                <button id="btn-phase-web"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('web')" title="Web Architect">🌐</button>
                <button id="btn-phase-prompt"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('prompt')" title="Prompt Engine">💬</button>
                <button id="btn-phase-agent"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('agent')" title="Agent Config">🤖</button>
                <button id="btn-phase-person"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('person')" title="Person Profile">👤</button>

                <div class="w-8 h-px bg-slate-800 my-2"></div>

            </div>

            <!-- Expandable Inspector Panel -->
            <div id="sidebar-content" class="flex flex-col w-[256px] shrink-0 bg-slate-900/90 h-full">
                <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                    <span class="font-bold text-xs uppercase tracking-widest text-slate-400">Inspector</span>
                    <button class="p-1 text-slate-400 hover:text-white" onclick="SC.toggleSidebar()"
                        title="Close Inspector">✕</button>
                </div>
                <!-- Main Action Bar (Persistent) -->
                <div id="main-action-bar" class="p-3 border-b border-slate-800 flex items-center justify-between gap-1 bg-slate-900 shrink-0 px-4">
                    <!-- Web Edit -->
                    <button id="btn-web-edit" class="hidden w-9 h-9 bg-slate-800 border border-slate-700 text-slate-400 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn" title="Web Edit">✏️</button>
                    <!-- Focal -->
                    <button id="btn-focal" class="w-9 h-9 bg-slate-800 border border-slate-700 text-slate-400 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn" title="Focal Mode">🎯</button>
                    <!-- Undo -->
                    <button id="btn-undo" class="w-9 h-9 bg-slate-800 border border-slate-700 text-slate-300 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn" title="Undo">↩️</button>
                    <!-- Arrange Organic -->
                    <button id="btn-arrange-organic" class="w-9 h-9 bg-slate-800 border border-slate-700 text-slate-300 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn" title="Organic Arrange">🌳</button>
                    <!-- Arrange Structured -->
                    <button id="btn-arrange-tree" class="w-9 h-9 bg-slate-800 border border-slate-700 text-slate-300 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn" title="Structured Arrange">🖧</button>
                    <!-- Add Node -->
                    <button id="btn-add" class="w-9 h-9 bg-indigo-900 border border-indigo-500 text-indigo-200 rounded-full flex items-center justify-center shadow hover:bg-indigo-600 hover:text-white transition-all tooltip-btn" title="Add Node">➕</button>
                </div>
                <div id="panel-properties" class="flex-1 overflow-auto custom-scrollbar"></div>
            </div>
        </div>

        <!-- Main Viewport -->
        <div id="viewport" class="relative flex-1 bg-slate-950 min-w-0 transition-all duration-300">
            <!-- Map Layer -->
            <div id="view-map" class="absolute inset-0 overflow-hidden">
                <svg id="edge-svg" class="absolute inset-0 pointer-events-none"></svg>
                <div id="world-layer" class="z-10 absolute inset-0"></div>
            </div>

            <!-- Render Layer -->
            <div id="view-content" class="absolute inset-0 hidden z-20 bg-slate-900 overflow-auto"></div>

            <!-- Overlays -->
            <div id="linking-overlay" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div
                    class="border-2 border-amber-500 bg-slate-900/90 text-amber-500 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase shadow-[0_0_15px_rgba(245,158,11,0.4)] animate-pulse backdrop-blur">
                    Select Target & Click Link
                </div>
            </div>

            <!-- NEW AI Target Overlay -->
            <div id="ai-overlay" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div
                    class="border-2 border-indigo-500 bg-slate-900/90 text-indigo-400 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase shadow-[0_0_15px_rgba(79,70,229,0.4)] animate-pulse backdrop-blur">
                    Select Smart-Portal to Inject AI Data
                </div>
            </div>

            <!-- Smart Action Button: centered in viewport canvas -->
            <button id="btn-smart-action" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 z-[100] text-xs font-bold uppercase tracking-widest px-6 py-3 rounded-full border shadow-lg transition-all flex items-center gap-2"></button>

        </div>
    </div>

    <!-- NEW AI Chat Container Placeholder -->
    <div id="ai-chat-container"></div>
    <!-- Initialization Script -->
    <script>
        function toggleDrawer(drawerId) {
            const drawer = document.getElementById(drawerId);
            const isOpening = drawer.classList.contains('translate-x-full');
            
            if (isOpening) {
                // Opening this drawer, close others
                drawer.classList.remove('translate-x-full');
                if (drawerId === 'data-manager-drawer') {
                    document.getElementById('profile-drawer').classList.add('translate-x-full');
                    if (window.Auth) window.Auth.renderDataManager(document.getElementById('data-manager-content'));
                } else if (drawerId === 'profile-drawer') {
                    document.getElementById('data-manager-drawer').classList.add('translate-x-full');
                    if (window.Auth) window.Auth.renderProfile(document.getElementById('profile-content'));
                }
                
                // Close the chat if it's open
                if (window.AI && window.AI.isOpen) {
                    window.AI.toggleChat();
                }
                
                // On mobile, close sidebar (inspector) too
                if (window.innerWidth <= 768 && window.SC && window.SC.dom.sidebar) {
                    window.SC.dom.sidebar.classList.remove('open');
                }
            } else {
                // Closing
                drawer.classList.add('translate-x-full');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            try {
                const Kernel = new MultiMapKernel();
                const Registry = new PhaseRegistrySystem();
                Registry.init(Kernel);

                if (!Kernel.state.session.selectedId && Kernel.state.nodes.length > 0) {
                    Kernel.selectNode(Kernel.state.nodes[0].id);
                }

                const Controller = new SandboxController(Kernel, Registry);
                window.Kernel = Kernel;
                window.SC = Controller;

                // INITIATE AI ENGINE
                window.AI = new MultiMapAI(Kernel, Controller);

                // INITIATE TUTORIALS
                window.Tutorials = new TutorialOrchestrator(window.AI);

                document.getElementById('btn-undo').onclick = () => { Kernel.undo(); };
                document.getElementById('btn-arrange-organic').onclick = () => { 
                    if (Kernel.state.session.layoutMode === 'structured') {
                        Kernel.state.session.layoutMode = 'organic';
                        Kernel.notify();
                    } else {
                        Kernel.autoLayoutOrganic(); 
                    }
                };
                document.getElementById('btn-arrange-tree').onclick = () => { 
                    Kernel.state.session.layoutMode = 'structured';
                    Kernel.notify();
                };

                document.getElementById('btn-add').onclick = () => {
                    const vp = Kernel.state.session.viewport;
                    const rect = document.getElementById('viewport').getBoundingClientRect();
                    const cx = (rect.width / 2 - vp.x) / vp.scale;
                    const cy = (rect.height / 2 - vp.y) / vp.scale;
                    
                    // Create a new submap in the library
                    const newMapId = Kernel.createSubmap('generic', 'New Space');
                    
                    // Determine parent: use focal/selected node if it exists
                    const parentId = Kernel.state.session.selectedId;
                    
                    // Create the portal node
                    const portal = Kernel.addNode({ 
                        type: 'portal', 
                        title: 'New Space', 
                        content: newMapId, 
                        x: cx, y: cy 
                    }, parentId);
                    
                    // If there's a parent, connect structurally
                    if (parentId) {
                        Kernel.addConnection(parentId, portal.id);
                    }
                    
                    // Enter the portal
                    SC.actionEnterPortal(portal.id);
                };

                const btnFocal = document.getElementById('btn-focal');
                const updateFocalUI = () => {
                    if (Kernel.config.autoFocus) {
                        btnFocal.className = "w-9 h-9 bg-sky-600 border border-sky-500 text-white rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(14,165,233,0.5)] hover:bg-sky-500 transition-all tooltip-btn";
                    } else {
                        btnFocal.className = "w-9 h-9 bg-slate-800 border border-slate-700 text-slate-400 rounded-full flex items-center justify-center shadow hover:bg-slate-700 hover:text-white transition-all tooltip-btn";
                    }
                };
                if (btnFocal) {
                    updateFocalUI();
                    btnFocal.onclick = () => {
                        Kernel.config.autoFocus = !Kernel.config.autoFocus;
                        updateFocalUI();
                    };
                }

            } catch (e) {
                console.error("Initialization Failed:", e);
            }
        });
    </script>
</body>

</html>
